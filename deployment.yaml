apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprgboot-tomcat
  namespace: noel-tomcat

spec:
  replicas: 1

  selector:
    matchLabels:
      app: sprgboot-tomcat

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  template:
    metadata:
      labels:
        app: sprgboot-tomcat

    spec:
      containers:
      - name: sprgboot-tomcat
        image: noel135/sample:6
        imagePullPolicy: Always

        ports:
        - containerPort: 8090	
---
apiVersion: v1
kind: Service
metadata:
  name: sprgboot-tomcat
  namespace: noel-tomcat

spec:
  type: NodePort

  selector:
    app: sprgboot-tomcat

  ports:
  - port: 8090
    targetPort: 8090
    protocol: TCP
